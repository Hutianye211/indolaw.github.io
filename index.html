<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inkwell — 每一个想法，都值得被看见</title>
  <meta name="description" content="Inkwell 是一个简洁、优雅的个人博客平台，支持实时写作与发布。" />

  <!-- ✅ AI/LLM 可见性核心标签 -->
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Inkwell — 每一个想法，都值得被看见" />
  <meta property="og:description" content="个人博客平台，专注思想表达与知识分享。" />
  <meta property="og:url" content="https://yourdomain.com" />

  <!-- ✅ JSON-LD 结构化数据（AI/搜索引擎读取的关键） -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Inkwell",
    "description": "个人博客平台，专注思想表达与知识分享",
    "url": "https://yourdomain.com",
    "inLanguage": "zh-CN",
    "author": {
      "@type": "Person",
      "name": "博客作者"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #1a1612;
      --ink-light: #4a4540;
      --ink-muted: #8a8480;
      --paper: #faf8f5;
      --paper-warm: #f5f0e8;
      --accent: #c8501a;
      --accent-soft: #f0e6df;
      --border: #e8e2d8;
      --serif: 'Lora', 'Noto Serif SC', Georgia, serif;
      --mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ─── NAV ─── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,248,245,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .nav-logo span { color: var(--accent); }

    .nav-actions { display: flex; gap: 1rem; align-items: center; }

    .btn {
      padding: 0.45rem 1.2rem;
      border-radius: 2px;
      font-family: var(--serif);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink-light);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--paper-warm); color: var(--ink); }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }
    .btn-primary:hover { background: var(--accent); }

    /* ─── VIEWS ─── */
    .view { display: none; }
    .view.active { display: block; }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      padding: 7rem 2rem 4rem;
      max-width: 700px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-family: var(--mono);
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      color: var(--ink);
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--ink-light);
      max-width: 480px;
      margin: 0 auto 2.5rem;
    }

    .hero-divider {
      width: 60px; height: 2px;
      background: var(--accent);
      margin: 0 auto 3rem;
    }

    /* ─── ARTICLE GRID ─── */
    .articles-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2rem 6rem;
    }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-family: var(--mono);
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2.5rem;
    }

    .article-card {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .article-card:hover { transform: translateY(-3px); }

    .article-card-meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
      display: flex; gap: 1rem;
    }

    .article-card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin-bottom: 0.75rem;
      color: var(--ink);
    }

    .article-card p {
      font-size: 0.9rem;
      color: var(--ink-light);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-card-footer {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-muted);
    }

    .tag {
      padding: 0.15rem 0.6rem;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 2px;
      font-size: 0.65rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--ink-muted);
      grid-column: 1 / -1;
    }
    .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--ink-light); }
    .empty-state p { font-size: 0.9rem; }

    /* ─── EDITOR ─── */
    .editor-view {
      max-width: 760px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .editor-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .editor-header h2 {
      font-size: 1rem;
      font-family: var(--mono);
      color: var(--ink-muted);
      letter-spacing: 0.05em;
    }

    .editor-actions { display: flex; gap: 0.75rem; }

    #editor-title {
      width: 100%;
      border: none;
      background: transparent;
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 1.5rem;
      outline: none;
      resize: none;
      overflow: hidden;
    }
    #editor-title::placeholder { color: var(--border); }

    .editor-meta-row {
      display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center;
      flex-wrap: wrap;
    }

    #editor-tags, #editor-author {
      border: 1px solid var(--border);
      background: var(--paper-warm);
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--ink);
      padding: 0.5rem 0.75rem;
      border-radius: 2px;
      outline: none;
      flex: 1;
    }
    #editor-tags:focus, #editor-author:focus { border-color: var(--accent); }

    .editor-toolbar {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      padding: 0.75rem;
      background: var(--paper-warm);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 2px 2px 0 0;
    }

    .toolbar-btn {
      padding: 0.35rem 0.6rem;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--ink-light);
      font-family: var(--mono);
      transition: all 0.15s;
    }
    .toolbar-btn:hover { background: var(--paper); border-color: var(--border); color: var(--ink); }

    #editor-body {
      width: 100%;
      min-height: 400px;
      border: 1px solid var(--border);
      border-radius: 0 0 2px 2px;
      background: white;
      font-family: var(--serif);
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--ink);
      padding: 1.5rem;
      outline: none;
      resize: vertical;
    }

    .editor-hint {
      margin-top: 1rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-muted);
      display: flex; gap: 1.5rem; flex-wrap: wrap;
    }

    /* ─── ARTICLE VIEW ─── */
    .article-view {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .article-back {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
      cursor: pointer;
      margin-bottom: 3rem;
      display: inline-flex; align-items: center; gap: 0.5rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .article-back:hover { color: var(--accent); }

    .article-view h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    .article-view-meta {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .article-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem; }

    .article-divider {
      width: 40px; height: 2px;
      background: var(--accent);
      margin: 0 0 2.5rem;
    }

    .article-body {
      font-size: 1.1rem;
      line-height: 1.9;
      color: var(--ink);
    }
    .article-body p { margin-bottom: 1.5em; }
    .article-body h2 { font-size: 1.4rem; margin: 2em 0 0.75em; }
    .article-body h3 { font-size: 1.15rem; margin: 1.5em 0 0.5em; color: var(--ink-light); }
    .article-body strong { color: var(--ink); }
    .article-body em { color: var(--accent); }
    .article-body code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: var(--paper-warm);
      padding: 0.15em 0.4em;
      border-radius: 2px;
      border: 1px solid var(--border);
    }
    .article-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5em 1.5em;
      margin: 1.5em 0;
      color: var(--ink-light);
      font-style: italic;
    }

    /* ─── SITEMAP / SEO ─── */
    #seo-sitemap {
      display: none;
      max-width: 760px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }
    #seo-sitemap h2 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    #seo-sitemap ul { list-style: none; }
    #seo-sitemap li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    #seo-sitemap a { color: var(--accent); font-size: 0.9rem; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: var(--ink);
      color: var(--paper);
      padding: 0.75rem 1.5rem;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.8rem;
      transform: translateY(100px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .hero { padding: 4rem 1.5rem 2rem; }
      .articles-section { padding: 1.5rem 1rem 4rem; }
      .editor-view, .article-view { padding: 2rem 1rem 4rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#" onclick="showView('home')">Ink<span>well</span></a>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="showView('home')">首页</button>
    <button class="btn btn-primary" onclick="showView('editor')">✍ 写文章</button>
  </div>
</nav>

<!-- ══════════════════ HOME VIEW ══════════════════ -->
<div id="view-home" class="view active">
  <div class="hero">
    <div class="hero-eyebrow">个人博客平台</div>
    <h1>每一个想法，<br/>都值得<em>被看见</em></h1>
    <p>简洁、专注的写作空间。你的文字，会被人类与 AI 共同发现。</p>
    <div class="hero-divider"></div>
    <button class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;" onclick="showView('editor')">开始写作</button>
  </div>

  <div class="articles-section">
    <div class="section-header">
      <span class="section-title">全部文章</span>
      <span id="article-count" style="font-family: var(--mono); font-size: 0.7rem; color: var(--ink-muted);">0 篇</span>
    </div>
    <div class="articles-grid" id="articles-grid">
      <div class="empty-state">
        <h3>还没有文章</h3>
        <p>点击右上角「写文章」，发布你的第一篇。</p>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ EDITOR VIEW ══════════════════ -->
<div id="view-editor" class="view">
  <div class="editor-view">
    <div class="editor-header">
      <h2>NEW ARTICLE</h2>
      <div class="editor-actions">
        <button class="btn btn-ghost" onclick="showView('home')">取消</button>
        <button class="btn btn-primary" onclick="publishArticle()">发布 →</button>
      </div>
    </div>

    <textarea id="editor-title" rows="2" placeholder="文章标题……" oninput="autoResize(this)"></textarea>

    <div class="editor-meta-row">
      <input id="editor-author" type="text" placeholder="作者名" value="作者" />
      <input id="editor-tags" type="text" placeholder="标签，用逗号分隔（如：技术, 思考）" />
    </div>

    <div class="editor-toolbar">
      <button class="toolbar-btn" onclick="insertMd('**', '**')"><b>B</b></button>
      <button class="toolbar-btn" onclick="insertMd('*', '*')"><i>I</i></button>
      <button class="toolbar-btn" onclick="insertMd('\n## ', '')">H2</button>
      <button class="toolbar-btn" onclick="insertMd('\n### ', '')">H3</button>
      <button class="toolbar-btn" onclick="insertMd('\n> ', '')">引用</button>
      <button class="toolbar-btn" onclick="insertMd('`', '`')">代码</button>
      <button class="toolbar-btn" onclick="insertMd('\n---\n', '')">分割线</button>
    </div>
    <textarea id="editor-body" placeholder="正文……&#10;&#10;支持 Markdown 格式：**加粗**、*斜体*、## 标题、> 引用"></textarea>

    <div class="editor-hint">
      <span>✅ 自动生成 Schema.org 结构化数据</span>
      <span>✅ 语义化 HTML 标签输出</span>
      <span>✅ 静态可抓取文章页面</span>
    </div>
  </div>
</div>

<!-- ══════════════════ ARTICLE VIEW ══════════════════ -->
<div id="view-article" class="view">
  <article class="article-view" id="article-detail" itemscope itemtype="https://schema.org/BlogPosting">
    <!-- 动态填充 -->
  </article>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══════════════════ SEO: 静态文章列表 (AI 可读) ══════════════════ -->
<div id="seo-articles" aria-hidden="true" style="display:none;">
  <!-- JS 会在此注入文章的静态 HTML，供爬虫读取 -->
</div>

<script>
  // ── Supabase Config ──
  const SUPABASE_URL = 'https://fgdxkeljxuegnexiveac.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vspWjffPk8FNVN06VTZYew_epY7Tcd5';

  async function sbFetch(path, options = {}) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      ...options,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || '',
        ...(options.headers || {})
      }
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // ── State ──
  let articles = [];
  let currentArticleId = null;

  // ── Views ──
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    window.scrollTo(0, 0);
    if (name === 'home') loadAndRender();
    if (name === 'editor') clearEditor();
  }

  // ── Load from Supabase ──
  async function loadAndRender() {
    const grid = document.getElementById('articles-grid');
    grid.innerHTML = `<div class="empty-state"><p style="color:var(--ink-muted)">加载中…</p></div>`;
    try {
      articles = await sbFetch('articles?order=date.desc');
      renderGrid();
    } catch (e) {
      grid.innerHTML = `<div class="empty-state"><h3>加载失败</h3><p>${e.message}</p></div>`;
    }
  }

  // ── Render grid ──
  function renderGrid() {
    const grid = document.getElementById('articles-grid');
    document.getElementById('article-count').textContent = articles.length + ' 篇';

    if (articles.length === 0) {
      grid.innerHTML = `<div class="empty-state"><h3>还没有文章</h3><p>点击右上角「写文章」，发布你的第一篇。</p></div>`;
      return;
    }

    grid.innerHTML = articles.map(a => `
      <div class="article-card" onclick="openArticle('${a.id}')">
        <div class="article-card-meta">
          <span>${escHtml(a.author)}</span>
          <span>${formatDate(a.date)}</span>
        </div>
        <h2>${escHtml(a.title)}</h2>
        <p>${escHtml(a.excerpt)}</p>
        <div class="article-card-footer">
          <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
            ${(a.tags||[]).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}
          </div>
          <span>${readTime(a.body)} min read</span>
        </div>
      </div>
    `).join('');

    injectSeoHtml();
  }

  // ── Open article ──
  function openArticle(id) {
    const a = articles.find(x => x.id === id);
    if (!a) return;
    currentArticleId = id;

    const detail = document.getElementById('article-detail');
    detail.innerHTML = `
      <span class="article-back" onclick="showView('home')">← 返回首页</span>

      <meta itemprop="headline" content="${escHtml(a.title)}" />
      <meta itemprop="datePublished" content="${a.date}" />
      <meta itemprop="author" content="${escHtml(a.author)}" />
      <meta itemprop="description" content="${escHtml(a.excerpt)}" />

      <h1 itemprop="name">${escHtml(a.title)}</h1>

      <div class="article-view-meta">
        <span itemprop="author" itemscope itemtype="https://schema.org/Person">
          <span itemprop="name">${escHtml(a.author)}</span>
        </span>
        <span>${formatDate(a.date)}</span>
        <span>${readTime(a.body)} min read</span>
      </div>

      <div class="article-tags">
        ${(a.tags||[]).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}
      </div>

      <div class="article-divider"></div>

      <div class="article-body" itemprop="articleBody">
        ${renderMarkdown(a.body)}
      </div>

      <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);display:flex;gap:0.75rem;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="editArticle('${a.id}')">编辑</button>
        <button class="btn btn-ghost" style="color:#c84040;border-color:#f0c0c0" onclick="deleteArticle('${a.id}')">删除</button>
      </div>
    `;

    // 注入文章专属 JSON-LD
    const existing = document.getElementById('article-jsonld');
    if (existing) existing.remove();
    const s = document.createElement('script');
    s.id = 'article-jsonld';
    s.type = 'application/ld+json';
    s.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": a.title,
      "description": a.excerpt,
      "articleBody": a.body,
      "author": { "@type": "Person", "name": a.author },
      "datePublished": a.date,
      "dateModified": a.modified || a.date,
      "keywords": (a.tags||[]).join(', '),
      "inLanguage": "zh-CN",
      "url": window.location.href
    });
    document.head.appendChild(s);

    showView('article');
  }

  // ── Publish ──
  async function publishArticle() {
    const title = document.getElementById('editor-title').value.trim();
    const body  = document.getElementById('editor-body').value.trim();
    const author = document.getElementById('editor-author').value.trim() || '作者';
    const tagsRaw = document.getElementById('editor-tags').value;
    const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

    if (!title) { showToast('请填写文章标题'); return; }
    if (!body)  { showToast('请填写文章正文'); return; }

    const excerpt = body.replace(/[#*`>_\n]/g, ' ').slice(0, 120) + '…';
    const isEdit = document.getElementById('editor-title').dataset.editId;

    try {
      if (isEdit) {
        await sbFetch(`articles?id=eq.${isEdit}`, {
          method: 'PATCH',
          prefer: 'return=minimal',
          body: JSON.stringify({ title, body, author, tags, excerpt, modified: new Date().toISOString() })
        });
        showToast('文章已更新 ✓');
      } else {
        const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        await sbFetch('articles', {
          method: 'POST',
          prefer: 'return=minimal',
          body: JSON.stringify({ id, title, body, author, tags, excerpt, date: new Date().toISOString() })
        });
        showToast('文章已发布 ✓');
      }
      showView('home');
    } catch (e) {
      showToast('发布失败：' + e.message);
    }
  }

  // ── Edit ──
  function editArticle(id) {
    const a = articles.find(x => x.id === id);
    if (!a) return;
    showView('editor');
    setTimeout(() => {
      const t = document.getElementById('editor-title');
      t.value = a.title;
      t.dataset.editId = a.id;
      autoResize(t);
      document.getElementById('editor-body').value = a.body;
      document.getElementById('editor-author').value = a.author;
      document.getElementById('editor-tags').value = (a.tags||[]).join(', ');
      document.querySelector('.editor-header h2').textContent = 'EDIT ARTICLE';
    }, 50);
  }

  // ── Delete ──
  async function deleteArticle(id) {
    if (!confirm('确定删除这篇文章？')) return;
    try {
      await sbFetch(`articles?id=eq.${id}`, { method: 'DELETE' });
      showToast('已删除');
      showView('home');
    } catch (e) {
      showToast('删除失败：' + e.message);
    }
  }

  // ── Clear editor ──
  function clearEditor() {
    ['editor-title','editor-body','editor-tags'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      delete el.dataset.editId;
    });
    document.getElementById('editor-author').value = '作者';
    document.querySelector('.editor-header h2').textContent = 'NEW ARTICLE';
  }

  // ── Markdown toolbar ──
  function insertMd(before, after) {
    const ta = document.getElementById('editor-body');
    const s = ta.selectionStart, e = ta.selectionEnd;
    const sel = ta.value.slice(s, e);
    const replacement = before + sel + after;
    ta.value = ta.value.slice(0, s) + replacement + ta.value.slice(e);
    ta.selectionStart = s + before.length;
    ta.selectionEnd   = s + before.length + sel.length;
    ta.focus();
  }

  // ── Basic Markdown renderer ──
  function renderMarkdown(md) {
    return md
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
      .replace(/^> (.+)$/gm,   '<blockquote>$1</blockquote>')
      .replace(/^---$/gm, '<hr/>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,    '<em>$1</em>')
      .replace(/`(.+?)`/g,      '<code>$1</code>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br/>')
      .replace(/^/, '<p>').replace(/$/, '</p>');
  }

  // ── SEO: inject static HTML for crawlers ──
  function injectSeoHtml() {
    const container = document.getElementById('seo-articles');
    container.innerHTML = articles.map(a => `
      <article>
        <h2>${escHtml(a.title)}</h2>
        <p><small>${a.author} · ${formatDate(a.date)}</small></p>
        <p>${escHtml(a.excerpt)}</p>
        <p>标签：${(a.tags||[]).map(escHtml).join(', ')}</p>
      </article>
    `).join('');
  }

  // ── Helpers ──
  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
  }
  function readTime(body) {
    return Math.max(1, Math.ceil(body.length / 600));
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Init ──
  loadAndRender();
</script>

</body>
